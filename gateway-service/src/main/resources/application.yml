server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
        - id: event-ingest
          uri: ${gateway.routes.ingest-uri:http://localhost:8081}
          predicates:
            - Path=/api/ingest/**
          filters:
            - StripPrefix=0
            # ① 全局限流（总闸）
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@globalKeyResolver}"
                redis-rate-limiter.replenishRate: 8000
                redis-rate-limiter.burstCapacity: 12000

            - name: RequestRateLimiter # 限流过滤器
              args:
                key-resolver: "#{@deviceKeyResolver}"
                redis-rate-limiter.replenishRate: 50 # 每秒50个 token // 单设备 8000qbs 多实例扩容 + kafka削峰
                redis-rate-limiter.burstCapacity: 100  # 最大突发100个 token

            - name: RequestRateLimiter
              args:
                key-resolver: "#{@apiKeyResolver}"
                redis-rate-limiter.replenishRate: 6000
                redis-rate-limiter.burstCapacity: 9000

            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 1000
                redis-rate-limiter.burstCapacity: 2000

        - id: event-query
          uri: ${gateway.routes.query-uri}
          predicates:
            - Path=/api/query/**
          filters:
            - StripPrefix=0

        - id: event-alert
          uri: ${gateway.routes.alert-uri}
          predicates:
            - Path=/api/alert/**
          filters:
            - StripPrefix=0

        - id: event-ai
          uri: ${gateway.routes.ai-uri}
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=0

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

gateway:
  auth:
    username: admin
    password: ${GATEWAY_AUTH_PASSWORD:}
  jwt:
    secret: ${JWT_SECRET:}
    expire-seconds: 3600
  blacklist:
    device-ids: []
    ips: []
  rate-limit:
    device:
      max-requests: 60
      window-seconds: 60
    ip:
      max-requests: 120
      window-seconds: 60
  routes:
    ingest-uri: http://localhost:8081
    query-uri: http://localhost:8085
    alert-uri: http://localhost:8083
    ai-uri: http://localhost:8084
